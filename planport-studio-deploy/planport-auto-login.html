<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PlanPort — Signing in…</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f1216; color: #e8eaed; display: grid; min-height: 100vh; place-items: center; margin: 0; }
    p { opacity: 0.85; font-size: 0.9rem; max-width: 28rem; text-align: center; padding: 1rem; }
  </style>
</head>
<body>
  <p id="msg">Signing you into PlanPort…</p>
  <!--
    Deploy this file to Firebase Hosting for the PlanPort site (same host as /admin).
    1. In Firebase console → PlanPort project → Project settings → Your apps → Web app,
       copy the firebaseConfig object into the script below.
    2. firebase deploy --only hosting (from the PlanPort project).
    3. In Ledger .env set:
       NEXT_PUBLIC_PLANPORT_HOSTED_URL=https://studio-5055895818-5ccef.web.app/planport-auto-login.html
  -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script>
    (function () {
      var firebaseConfig = {
        apiKey: 'PASTE_PLANPORT_WEB_API_KEY',
        authDomain: 'PASTE_PLANPORT_AUTH_DOMAIN',
        projectId: 'PASTE_PLANPORT_PROJECT_ID',
        storageBucket: 'PASTE_PLANPORT_STORAGE_BUCKET',
        messagingSenderId: 'PASTE_PLANPORT_SENDER_ID',
        appId: 'PASTE_PLANPORT_APP_ID',
      };
      var email = 'jeff@designersink.us';
      var password = 'Bonnie#274';
      var msg = document.getElementById('msg');
      function fail(t) {
        msg.textContent = t || 'Sign-in failed.';
      }
      try {
        firebase.initializeApp(firebaseConfig);
      } catch (e) {
        fail('Invalid Firebase config. Edit planport-auto-login.html with your PlanPort web app config.');
        return;
      }
      firebase
        .auth()
        .signInWithEmailAndPassword(email, password)
        .then(function () {
          window.location.replace('/admin');
        })
        .catch(function (e) {
          fail((e && e.message) || 'Sign-in failed.');
        });
    })();
  </script>
</body>
</html>
